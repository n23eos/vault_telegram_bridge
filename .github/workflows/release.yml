name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write
  # Required since Jan 2026 for the artifact storage record the
  # attestation action emits.
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      # Cryptographic provenance: lets anyone verify the assets were built
      # from this repository by this workflow (gh attestation verify).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # Re-running for an existing tag (e.g. to attest already-released
      # assets) replaces the files and keeps the release notes.
      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            main.js manifest.json styles.css \
          || gh release upload "$tag" main.js manifest.json styles.css --clobber
